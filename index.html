<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>梅花易数 · 数字起卦</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;700;900&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg-deep: #06060f;
  --bg-card: rgba(12,12,30,0.85);
  --gold: #d4a574;
  --gold-bright: #f0c87a;
  --gold-glow: rgba(212,165,116,0.4);
  --jade: #3abfad;
  --jade-glow: rgba(58,191,173,0.35);
  --crimson: #c0392b;
  --text: #e8dcc8;
  --text-dim: #8a8072;
  --font-display: 'Ma Shan Zheng', cursive;
  --font-body: 'Noto Serif SC', 'Songti SC', serif;
  --font-accent: 'ZCOOL XiaoWei', serif;
}

html { font-size: 16px; }
body {
  font-family: var(--font-body);
  background: var(--bg-deep);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

#bg-canvas {
  position: fixed; top:0; left:0; width:100%; height:100%;
  z-index: 0; pointer-events: none;
}

#root { position: relative; z-index: 1; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 3px; }

/* ===== HEADER ===== */
.header {
  text-align: center;
  padding: 3rem 1rem 2rem;
  position: relative;
}
.header__taiji {
  width: 70px; height: 70px;
  margin: 0 auto 1rem;
  animation: taiji-spin 20s linear infinite;
  filter: drop-shadow(0 0 18px var(--gold-glow));
}
@keyframes taiji-spin { to { transform: rotate(360deg); } }

.header__title {
  font-family: var(--font-display);
  font-size: clamp(2.8rem, 8vw, 4.5rem);
  color: var(--gold-bright);
  letter-spacing: 0.15em;
  text-shadow: 0 0 30px var(--gold-glow), 0 2px 4px rgba(0,0,0,0.6);
  line-height: 1.2;
}
.header__sub {
  font-family: var(--font-accent);
  font-size: 1rem;
  color: var(--text-dim);
  margin-top: 0.4rem;
  letter-spacing: 0.3em;
}

/* ===== MAIN CONTAINER ===== */
.container {
  max-width: 680px;
  margin: 0 auto;
  padding: 0 1.2rem 4rem;
}

/* ===== INPUT SECTION ===== */
.altar {
  background: var(--bg-card);
  border: 1px solid rgba(212,165,116,0.15);
  border-radius: 16px;
  padding: 2rem 1.5rem;
  position: relative;
  overflow: hidden;
  backdrop-filter: blur(10px);
}
.altar::before {
  content: '';
  position: absolute; top: -1px; left: 20%; right: 20%; height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}
.altar::after {
  content: '';
  position: absolute; bottom: -1px; left: 20%; right: 20%; height: 2px;
  background: linear-gradient(90deg, transparent, var(--jade), transparent);
}

.altar__label {
  font-family: var(--font-accent);
  font-size: 1.1rem;
  color: var(--gold);
  text-align: center;
  margin-bottom: 0.3rem;
}
.altar__hint {
  text-align: center;
  font-size: 0.82rem;
  color: var(--text-dim);
  margin-bottom: 1.4rem;
}

.altar__inputs {
  display: flex;
  gap: 12px;
  justify-content: center;
  margin-bottom: 1.6rem;
}
.altar__input {
  width: 90px;
  padding: 0.7rem 0;
  text-align: center;
  font-family: var(--font-display);
  font-size: 1.6rem;
  color: var(--gold-bright);
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(212,165,116,0.2);
  border-radius: 10px;
  outline: none;
  transition: border-color 0.3s, box-shadow 0.3s;
}
.altar__input:focus {
  border-color: var(--gold);
  box-shadow: 0 0 20px var(--gold-glow), inset 0 0 12px rgba(212,165,116,0.06);
}
.altar__input::placeholder {
  color: rgba(212,165,116,0.25);
  font-size: 1rem;
}

.altar__btn {
  display: block;
  margin: 0 auto;
  padding: 0.8rem 3rem;
  font-family: var(--font-display);
  font-size: 1.5rem;
  letter-spacing: 0.2em;
  color: var(--bg-deep);
  background: linear-gradient(135deg, var(--gold), var(--gold-bright));
  border: none;
  border-radius: 50px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: transform 0.25s, box-shadow 0.3s;
}
.altar__btn:hover {
  transform: scale(1.05);
  box-shadow: 0 0 35px var(--gold-glow);
}
.altar__btn:active { transform: scale(0.97); }
.altar__btn::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.25) 50%, transparent 60%);
  transform: translateX(-100%);
  transition: transform 0.6s;
}
.altar__btn:hover::after { transform: translateX(100%); }

/* ===== RESULT SECTION ===== */
.result { margin-top: 2rem; }

.result__row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin-bottom: 14px;
}

.gua-card {
  background: var(--bg-card);
  border: 1px solid rgba(212,165,116,0.12);
  border-radius: 14px;
  padding: 1.4rem 1rem;
  text-align: center;
  position: relative;
  overflow: hidden;
  opacity: 0;
  transform: translateY(30px);
  animation: card-in 0.6s ease-out forwards;
  backdrop-filter: blur(8px);
}
.gua-card--full { grid-column: 1 / -1; }
.gua-card:nth-child(1) { animation-delay: 0.1s; }
.gua-card:nth-child(2) { animation-delay: 0.25s; }

@keyframes card-in {
  to { opacity:1; transform: translateY(0); }
}

.gua-card__tag {
  font-family: var(--font-accent);
  font-size: 0.75rem;
  color: var(--jade);
  letter-spacing: 0.15em;
  margin-bottom: 0.6rem;
  text-transform: uppercase;
}

.gua-card__name {
  font-family: var(--font-display);
  font-size: 1.8rem;
  color: var(--gold-bright);
  text-shadow: 0 0 12px var(--gold-glow);
  margin-bottom: 0.8rem;
}

/* Hexagram lines */
.hex-lines {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  margin: 0.6rem 0;
}
.hex-line {
  display: flex;
  justify-content: center;
  gap: 8px;
  height: 6px;
  width: 72px;
  position: relative;
}
.hex-line--yang {
  background: var(--gold);
  border-radius: 3px;
  box-shadow: 0 0 8px var(--gold-glow);
}
.hex-line--yin {
  background: transparent;
}
.hex-line--yin::before,
.hex-line--yin::after {
  content: '';
  width: 28px; height: 6px;
  background: var(--jade);
  border-radius: 3px;
  box-shadow: 0 0 8px var(--jade-glow);
  position: absolute; top: 0;
}
.hex-line--yin::before { left: 0; }
.hex-line--yin::after { right: 0; }

.hex-line--change {
  animation: line-pulse 1.5s ease-in-out infinite;
}
@keyframes line-pulse {
  0%,100% { filter: brightness(1); }
  50% { filter: brightness(1.6); }
}

/* Info card */
.info-card {
  background: var(--bg-card);
  border: 1px solid rgba(212,165,116,0.1);
  border-radius: 14px;
  padding: 1.3rem 1.2rem;
  opacity: 0;
  transform: translateY(20px);
  animation: card-in 0.5s ease-out forwards;
  backdrop-filter: blur(8px);
}
.info-card--delay1 { animation-delay: 0.4s; }
.info-card--delay2 { animation-delay: 0.55s; }
.info-card--delay3 { animation-delay: 0.7s; }

.info-card__title {
  font-family: var(--font-accent);
  font-size: 0.8rem;
  color: var(--jade);
  letter-spacing: 0.12em;
  margin-bottom: 0.5rem;
}
.info-card__body {
  font-size: 0.95rem;
  line-height: 1.7;
  color: var(--text);
}
.info-card__body strong {
  color: var(--gold-bright);
  font-weight: 700;
}

.fortune-badge {
  display: inline-block;
  padding: 0.3rem 1.2rem;
  border-radius: 20px;
  font-family: var(--font-display);
  font-size: 1.3rem;
  margin-top: 0.5rem;
}
.fortune-badge--ji {
  background: rgba(58,191,173,0.15);
  border: 1px solid var(--jade);
  color: var(--jade);
}
.fortune-badge--xiong {
  background: rgba(192,57,43,0.15);
  border: 1px solid var(--crimson);
  color: var(--crimson);
}
.fortune-badge--ping {
  background: rgba(212,165,116,0.12);
  border: 1px solid var(--gold);
  color: var(--gold);
}

/* Divider */
.divider {
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(212,165,116,0.2), transparent);
  margin: 0.8rem 0;
}

/* ===== FOOTER ===== */
.footer {
  text-align: center;
  padding: 2rem 1rem;
  font-size: 0.78rem;
  color: var(--text-dim);
  line-height: 1.8;
  max-width: 520px;
  margin: 0 auto;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 480px) {
  .altar__inputs { flex-wrap: wrap; }
  .altar__input { width: 80px; }
  .result__row { grid-template-columns: 1fr; }
  .gua-card__name { font-size: 1.5rem; }
}

/* ===== LANG TOGGLE ===== */
.lang-toggle {
  position: fixed;
  top: 1rem;
  right: 1rem;
  z-index: 100;
  display: flex;
  align-items: center;
  gap: 0;
  background: var(--bg-card);
  border: 1px solid rgba(212,165,116,0.2);
  border-radius: 20px;
  padding: 3px;
  backdrop-filter: blur(10px);
}
.lang-toggle__btn {
  padding: 0.3rem 0.7rem;
  font-family: var(--font-body);
  font-size: 0.75rem;
  border: none;
  border-radius: 16px;
  cursor: pointer;
  background: transparent;
  color: var(--text-dim);
  transition: all 0.3s;
  white-space: nowrap;
}
.lang-toggle__btn--active {
  background: linear-gradient(135deg, var(--gold), var(--gold-bright));
  color: var(--bg-deep);
  font-weight: 700;
}

/* Loading shimmer */
.loading-ring {
  width: 50px; height: 50px;
  margin: 2rem auto;
  border: 2px solid rgba(212,165,116,0.15);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: ring-spin 0.8s linear infinite;
}
@keyframes ring-spin { to { transform: rotate(360deg); } }

/* ===== MODE TABS ===== */
.mode-tabs {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4px;
  margin-bottom: 1.6rem;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(212,165,116,0.15);
  border-radius: 12px;
  padding: 4px;
  position: relative;
}
.mode-tab {
  padding: 0.5rem 0.6rem;
  font-family: var(--font-accent);
  font-size: 0.85rem;
  letter-spacing: 0.08em;
  border: none;
  border-radius: 9px;
  cursor: pointer;
  background: transparent;
  color: var(--text-dim);
  transition: all 0.35s ease;
  position: relative;
  z-index: 1;
  white-space: nowrap;
  text-align: center;
}
.mode-tab--active {
  background: linear-gradient(135deg, rgba(212,165,116,0.18), rgba(58,191,173,0.12));
  color: var(--gold-bright);
  box-shadow: 0 0 16px rgba(212,165,116,0.15);
  border: 1px solid rgba(212,165,116,0.25);
}
.mode-tab:not(.mode-tab--active):hover {
  color: var(--text);
  background: rgba(255,255,255,0.03);
}

/* ===== TIME MODE ===== */
.time-info {
  text-align: center;
  margin-bottom: 1.6rem;
}
.time-info__solar {
  font-family: var(--font-body);
  font-size: 0.9rem;
  color: var(--text-dim);
  margin-bottom: 0.4rem;
}
.time-info__lunar {
  font-family: var(--font-accent);
  font-size: 1.15rem;
  color: var(--gold);
  margin-bottom: 0.4rem;
}
.time-info__ganzhi {
  font-family: var(--font-display);
  font-size: 1.4rem;
  color: var(--jade);
  margin-bottom: 0.3rem;
  text-shadow: 0 0 10px var(--jade-glow);
}
.time-info__shichen {
  font-family: var(--font-accent);
  font-size: 1rem;
  color: var(--gold-bright);
  margin-bottom: 0.2rem;
}
.time-info__clock {
  font-family: var(--font-body);
  font-size: 0.85rem;
  color: var(--text-dim);
}

/* ===== COMPASS (Direction Mode) ===== */
.compass-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-bottom: 1.4rem;
}
.compass {
  position: relative;
  width: 280px;
  height: 280px;
  margin: 0.5rem auto 1rem;
}
.compass__center {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 60px; height: 60px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(212,165,116,0.15), transparent);
  border: 1px solid rgba(212,165,116,0.2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-display);
  font-size: 0.9rem;
  color: var(--gold);
  z-index: 2;
  pointer-events: none;
}
.compass__segment {
  position: absolute;
  top: 50%; left: 50%;
  width: 100px; height: 100px;
  margin-left: -50px;
  margin-top: -50px;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding-top: 8px;
  transition: all 0.3s ease;
  clip-path: polygon(50% 50%, 20% 0%, 80% 0%);
  background: rgba(212,165,116,0.06);
  border: none;
  color: var(--text);
}
.compass__segment:hover {
  background: rgba(212,165,116,0.15);
  filter: drop-shadow(0 0 8px var(--gold-glow));
}
.compass__segment--selected {
  background: rgba(212,165,116,0.22) !important;
  filter: drop-shadow(0 0 14px var(--gold-glow));
}
/* Position each segment with rotation. Origin at center of compass. */
.compass__seg-0 { transform: rotate(0deg) translateY(-40px); }
.compass__seg-1 { transform: rotate(45deg) translateY(-40px); }
.compass__seg-2 { transform: rotate(90deg) translateY(-40px); }
.compass__seg-3 { transform: rotate(135deg) translateY(-40px); }
.compass__seg-4 { transform: rotate(180deg) translateY(-40px); }
.compass__seg-5 { transform: rotate(225deg) translateY(-40px); }
.compass__seg-6 { transform: rotate(270deg) translateY(-40px); }
.compass__seg-7 { transform: rotate(315deg) translateY(-40px); }

/* Use a nicer octagonal button approach */
.compass-oct {
  position: relative;
  width: 280px;
  height: 280px;
  margin: 0.6rem auto 1rem;
}
.compass-oct__btn {
  position: absolute;
  width: 76px;
  height: 76px;
  background: rgba(212,165,116,0.07);
  border: 1px solid rgba(212,165,116,0.18);
  border-radius: 12px;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  transition: all 0.3s ease;
  color: var(--text);
  padding: 4px;
}
.compass-oct__btn:hover {
  background: rgba(212,165,116,0.16);
  box-shadow: 0 0 16px var(--gold-glow);
  border-color: var(--gold);
}
.compass-oct__btn--selected {
  background: linear-gradient(135deg, rgba(212,165,116,0.2), rgba(58,191,173,0.12));
  border-color: var(--gold);
  box-shadow: 0 0 20px var(--gold-glow), 0 0 40px rgba(212,165,116,0.15);
}
.compass-oct__symbol {
  font-size: 1.3rem;
  line-height: 1;
}
.compass-oct__dir {
  font-family: var(--font-display);
  font-size: 0.95rem;
  color: var(--gold-bright);
  line-height: 1;
}
.compass-oct__trigram {
  font-family: var(--font-accent);
  font-size: 0.7rem;
  color: var(--text-dim);
  line-height: 1;
}
/* Positions: 8 buttons in octagonal layout around center */
.compass-oct__pos-0 { top: 0; left: 50%; transform: translateX(-50%); }          /* S - top */
.compass-oct__pos-1 { top: 12%; right: 0; }                                        /* SW - top-right */
.compass-oct__pos-2 { top: 50%; right: 0; transform: translateY(-50%); }           /* W - right */
.compass-oct__pos-3 { bottom: 12%; right: 0; }                                     /* NW - bottom-right */
.compass-oct__pos-4 { bottom: 0; left: 50%; transform: translateX(-50%); }         /* N - bottom */
.compass-oct__pos-5 { bottom: 12%; left: 0; }                                      /* NE - bottom-left */
.compass-oct__pos-6 { top: 50%; left: 0; transform: translateY(-50%); }            /* E - left */
.compass-oct__pos-7 { top: 12%; left: 0; }                                         /* SE - top-left */

.compass-oct__center {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 64px; height: 64px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(58,191,173,0.1), transparent);
  border: 1px solid rgba(58,191,173,0.2);
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
}
.compass-oct__center-text {
  font-family: var(--font-display);
  font-size: 0.85rem;
  color: var(--jade);
}
.compass-label {
  font-family: var(--font-accent);
  font-size: 0.9rem;
  color: var(--text-dim);
  text-align: center;
  margin-bottom: 0.3rem;
}

/* ===== SOUND / TAP COUNTER ===== */
.sound-panel {
  text-align: center;
}
.sound-phase {
  font-family: var(--font-accent);
  font-size: 1.1rem;
  color: var(--gold);
  margin-bottom: 0.5rem;
}
.sound-hint {
  font-size: 0.82rem;
  color: var(--text-dim);
  margin-bottom: 1rem;
}
.tap-btn-wrap {
  position: relative;
  display: inline-block;
  margin-bottom: 1rem;
}
.tap-btn {
  width: 120px; height: 120px;
  border-radius: 50%;
  background: radial-gradient(circle at 40% 35%, rgba(212,165,116,0.18), rgba(58,191,173,0.08));
  border: 2px solid rgba(212,165,116,0.3);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.15s, box-shadow 0.15s;
  position: relative;
  overflow: hidden;
  color: var(--gold-bright);
  font-family: var(--font-display);
  font-size: 1.3rem;
}
.tap-btn:hover {
  box-shadow: 0 0 30px var(--gold-glow);
}
.tap-btn:active {
  transform: scale(0.93);
}
.tap-ripple {
  position: absolute;
  border-radius: 50%;
  background: rgba(212,165,116,0.3);
  animation: tap-ripple-anim 0.6s ease-out forwards;
  pointer-events: none;
}
@keyframes tap-ripple-anim {
  0% { width: 0; height: 0; opacity: 0.6; }
  100% { width: 200px; height: 200px; opacity: 0; margin-left: -100px; margin-top: -100px; }
}
.tap-count {
  font-family: var(--font-display);
  font-size: 3.5rem;
  color: var(--gold-bright);
  text-shadow: 0 0 20px var(--gold-glow);
  margin: 0.5rem 0;
  line-height: 1;
}
.tap-count-label {
  font-family: var(--font-accent);
  font-size: 0.85rem;
  color: var(--text-dim);
  margin-bottom: 1rem;
}
.sound-btns {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin-top: 1rem;
}
.sound-btn {
  padding: 0.5rem 1.5rem;
  font-family: var(--font-accent);
  font-size: 0.9rem;
  border: 1px solid rgba(212,165,116,0.3);
  border-radius: 8px;
  background: rgba(212,165,116,0.08);
  color: var(--gold);
  cursor: pointer;
  transition: all 0.3s;
}
.sound-btn:hover {
  background: rgba(212,165,116,0.18);
  box-shadow: 0 0 12px var(--gold-glow);
}
.sound-btn--reset {
  border-color: rgba(192,57,43,0.3);
  color: var(--crimson);
  background: rgba(192,57,43,0.08);
}
.sound-btn--reset:hover {
  background: rgba(192,57,43,0.18);
}
.sound-summary {
  display: flex;
  justify-content: center;
  gap: 2rem;
  margin: 1rem 0;
}
.sound-summary__item {
  text-align: center;
}
.sound-summary__label {
  font-family: var(--font-accent);
  font-size: 0.8rem;
  color: var(--text-dim);
  margin-bottom: 0.2rem;
}
.sound-summary__val {
  font-family: var(--font-display);
  font-size: 1.8rem;
  color: var(--jade);
}

@media (max-width: 480px) {
  .compass-oct { width: 240px; height: 240px; }
  .compass-oct__btn { width: 64px; height: 64px; }
  .compass-oct__symbol { font-size: 1.1rem; }
  .compass-oct__dir { font-size: 0.85rem; }
  .compass-oct__trigram { font-size: 0.65rem; }

/* ========== CHARACTER DIVINATION ========== */
function divineByCharacter(chars, overrides) {
  // chars: array of {char, strokes} objects
  const strokes = chars.map((c, i) => overrides[i] != null ? overrides[i] : c.strokes);
  const total = strokes.reduce((a, b) => a + b, 0);
  let upper, lower, changeLine;
  if (strokes.length === 1) {
    upper = modWrap(strokes[0], 8);
    lower = modWrap(strokes[0], 8);
    changeLine = modWrap(strokes[0], 6);
  } else if (strokes.length === 2) {
    upper = modWrap(strokes[0], 8);
    lower = modWrap(strokes[1], 8);
    changeLine = modWrap(total, 6);
  } else {
    var mid = Math.ceil(strokes.length / 2);
    var s1 = strokes.slice(0, mid).reduce((a, b) => a + b, 0);
    var s2 = strokes.slice(mid).reduce((a, b) => a + b, 0);
    upper = modWrap(s1, 8);
    lower = modWrap(s2, 8);
    changeLine = modWrap(total, 6);
  }
  var upperTri = TRIGRAMS[upper];
  var lowerTri = TRIGRAMS[lower];
  var benLines = [...lowerTri.lines, ...upperTri.lines];
  var bianLines = [...benLines];
  bianLines[changeLine - 1] = bianLines[changeLine - 1] === 1 ? 0 : 1;
  var findTriIdx = (ls) => TRIGRAMS.findIndex((t,i) => i > 0 && t.lines[0]===ls[0] && t.lines[1]===ls[1] && t.lines[2]===ls[2]);
  var bianUpperIdx = findTriIdx(bianLines.slice(3, 6));
  var bianLowerIdx = findTriIdx(bianLines.slice(0, 3));
  var huLower = benLines.slice(1, 4);
  var huUpper = benLines.slice(2, 5);
  var huUpperIdx = findTriIdx(huUpper);
  var huLowerIdx = findTriIdx(huLower);
  var ti, yong;
  if (changeLine <= 3) { ti = upperTri; yong = lowerTri; }
  else { ti = lowerTri; yong = upperTri; }
  var benName = HEX_NAMES[`${upper}${lower}`] || `${upperTri.name}${lowerTri.name}卦`;
  var bianName = HEX_NAMES[`${bianUpperIdx}${bianLowerIdx}`] || '未知卦';
  var huName = HEX_NAMES[`${huUpperIdx}${huLowerIdx}`] || '未知卦';
  var rel = getRelation(ti.element, yong.element);
  return { upper, lower, changeLine, benLines, benName, bianLines, bianName, huName, ti, yong, rel, upperTri, lowerTri };
}

// 克: 金克木, 木克土, 土克水, 水克火, 火克金
function getRelation(tiElement, yongElement) {
  if (tiElement === yongElement) return { key:'比和', fortune:'平' };
  const gen = { '金':'水','水':'木','木':'火','火':'土','土':'金' };
  const ke  = { '金':'木','木':'土','土':'水','水':'火','火':'金' };
  if (gen[tiElement] === yongElement) return { key:'体生用', fortune:'凶' };
  if (gen[yongElement] === tiElement) return { key:'用生体', fortune:'吉' };
  if (ke[tiElement] === yongElement)  return { key:'体克用', fortune:'小吉' };
  if (ke[yongElement] === tiElement)  return { key:'用克体', fortune:'凶' };
  return { key:'比和', fortune:'平' };
}

/* ========== DIVINATION LOGIC ========== */
function modWrap(n, m) { const r = n % m; return r === 0 ? m : r; }

function divine(nums) {
  let upper, lower, changeLine;
  if (nums.length === 1) {
    const s = String(nums[0]);
    const mid = Math.ceil(s.length / 2);
    const a = parseInt(s.slice(0, mid), 10) || 1;
    const b = parseInt(s.slice(mid), 10) || 1;
    upper = modWrap(a, 8);
    lower = modWrap(b, 8);
    changeLine = modWrap(a + b, 6);
  } else if (nums.length === 2) {
    upper = modWrap(nums[0], 8);
    lower = modWrap(nums[1], 8);
    changeLine = modWrap(nums[0] + nums[1], 6);
  } else {
    upper = modWrap(nums[0], 8);
    lower = modWrap(nums[1], 8);
    changeLine = modWrap(nums[2], 6);
  }

  const upperTri = TRIGRAMS[upper];
  const lowerTri = TRIGRAMS[lower];

  // 本卦 lines: bottom(1) to top(6). lower tri = lines 1-3, upper tri = lines 4-6
  const benLines = [...lowerTri.lines, ...upperTri.lines]; // index 0=line1(bottom)

  // 变卦: flip changeLine (1-indexed)
  const bianLines = [...benLines];
  bianLines[changeLine - 1] = bianLines[changeLine - 1] === 1 ? 0 : 1;

  // Figure out changed trigrams
  const bianLower = bianLines.slice(0, 3);
  const bianUpper = bianLines.slice(3, 6);
  const findTriIdx = (ls) => TRIGRAMS.findIndex((t,i) => i > 0 && t.lines[0]===ls[0] && t.lines[1]===ls[1] && t.lines[2]===ls[2]);
  const bianUpperIdx = findTriIdx(bianUpper);
  const bianLowerIdx = findTriIdx(bianLower);

  // 互卦: lines 2,3,4 → lower; lines 3,4,5 → upper (1-indexed)
  const huLower = benLines.slice(1, 4);
  const huUpper = benLines.slice(2, 5);
  const huUpperIdx = findTriIdx(huUpper);
  const huLowerIdx = findTriIdx(huLower);

  // 体用: changeLine 1-3 → in lower trigram → lower=用, upper=体
  //        changeLine 4-6 → in upper trigram → upper=用, lower=体
  let ti, yong;
  if (changeLine <= 3) {
    ti = upperTri; yong = lowerTri;
  } else {
    ti = lowerTri; yong = upperTri;
  }

  const benName = HEX_NAMES[`${upper}${lower}`] || `${upperTri.name}${lowerTri.name}卦`;
  const bianName = HEX_NAMES[`${bianUpperIdx}${bianLowerIdx}`] || '未知卦';
  const huName = HEX_NAMES[`${huUpperIdx}${huLowerIdx}`] || '未知卦';

  const rel = getRelation(ti.element, yong.element);

  return {
    upper, lower, changeLine,
    benLines, benName,
    bianLines, bianName,
    huName,
    ti, yong,
    rel,
    upperTri, lowerTri,
  };
}

function lYear(y){var i,sum=348;for(i=0x8000;i>0x8;i>>=1)sum+=(lunarInfo[y-1900]&i)?1:0;return sum+leapDays(y);}
function leapMonth(y){return lunarInfo[y-1900]&0xf;}
function leapDays(y){if(leapMonth(y))return(lunarInfo[y-1900]&0x10000)?30:29;return 0;}
function monthDays(y,m){return(lunarInfo[y-1900]&(0x10000>>m))?30:29;}

function solarToLunar(sy, sm, sd) {
  var baseDate = new Date(1900, 0, 31); // Lunar 1900/1/1
  var objDate = new Date(sy, sm - 1, sd);
  var offset = Math.round((objDate - baseDate) / 86400000);

  // Find lunar year
  var y;
  for (y = 1900; y < 2101; y++) {
    var dy = lYear(y);
    if (offset < dy) break;
    offset -= dy;
  }

  // Find lunar month
  var lm = leapMonth(y); // 0 if no leap
  var isLeap = false;
  var m;
  for (m = 1; m <= 13; m++) {
    var dm;
    if (lm > 0 && m === lm + 1) {
      dm = leapDays(y);
      isLeap = true;
    } else {
      var actualMonth = (lm > 0 && m > lm + 1) ? m - 1 : m;
      if (actualMonth > 12) break;
      dm = monthDays(y, actualMonth);
      isLeap = false;
    }
    if (offset < dm) {
      // We found the month
      if (isLeap) { m = lm; }
      else { m = (lm > 0 && m > lm + 1) ? m - 1 : m; }
      break;
    }
    offset -= dm;
  }
  return { year: y, month: m, day: offset + 1, isLeap: isLeap };
}

/* ========== TIME DIVINATION ========== */
function getShichen(hour) {
  // 23:00-00:59 → 1 (子), 01:00-02:59 → 2 (丑), ..., 21:00-22:59 → 12 (亥)
  if (hour >= 23 || hour < 1) return 1;
  return Math.floor((hour + 1) / 2) + 1;
}

function getYearBranch(year) {
  // (year - 4) % 12: 0=子,1=丑,...,11=亥 → branch number = index + 1
  return ((year - 4) % 12 + 12) % 12 + 1;
}

function getYearGanZhi(year) {
  // 天干: (year - 4) % 10 → 0=甲,1=乙,...
  // 地支: (year - 4) % 12 → 0=子,1=丑,...
  var ganIdx = ((year - 4) % 10 + 10) % 10;
  var zhiIdx = ((year - 4) % 12 + 12) % 12;
  return { ganIdx, zhiIdx };
}

function divineByTime() {
  var now = new Date();
  var sy = now.getFullYear(), sm = now.getMonth() + 1, sd = now.getDate();
  var hour = now.getHours();

  var lunar = solarToLunar(sy, sm, sd);
  var yearBranch = getYearBranch(lunar.year);
  var shichen = getShichen(hour);
  var lm = lunar.month, ld = lunar.day;

  var sumBase = yearBranch + lm + ld;
  var upper = modWrap(sumBase, 8);
  var lower = modWrap(sumBase + shichen, 8);
  var changeLine = modWrap(sumBase + shichen, 6);

  var result = divine([0]); // placeholder, we override

  // Re-calculate using our values
  var upperTri = TRIGRAMS[upper];
  var lowerTri = TRIGRAMS[lower];
  var benLines = [...lowerTri.lines, ...upperTri.lines];
  var bianLines = [...benLines];
  bianLines[changeLine - 1] = bianLines[changeLine - 1] === 1 ? 0 : 1;

  var findTriIdx = (ls) => TRIGRAMS.findIndex((t,i) => i > 0 && t.lines[0]===ls[0] && t.lines[1]===ls[1] && t.lines[2]===ls[2]);
  var bianUpperIdx = findTriIdx(bianLines.slice(3, 6));
  var bianLowerIdx = findTriIdx(bianLines.slice(0, 3));
  var huLower = benLines.slice(1, 4);
  var huUpper = benLines.slice(2, 5);
  var huUpperIdx = findTriIdx(huUpper);
  var huLowerIdx = findTriIdx(huLower);

  var ti, yong;
  if (changeLine <= 3) { ti = upperTri; yong = lowerTri; }
  else { ti = lowerTri; yong = upperTri; }

  var benName = HEX_NAMES[`${upper}${lower}`] || `${upperTri.name}${lowerTri.name}卦`;
  var bianName = HEX_NAMES[`${bianUpperIdx}${bianLowerIdx}`] || '未知卦';
  var huName = HEX_NAMES[`${huUpperIdx}${huLowerIdx}`] || '未知卦';
  var rel = getRelation(ti.element, yong.element);

  var gz = getYearGanZhi(lunar.year);

  return {
    upper, lower, changeLine,
    benLines, benName,
    bianLines, bianName,
    huName,
    ti, yong,
    rel,
    upperTri, lowerTri,
    // Extra time info
    timeInfo: {
      solar: { year: sy, month: sm, day: sd },
      lunar: lunar,
      yearBranch: yearBranch,
      shichen: shichen,
      ganIdx: gz.ganIdx,
      zhiIdx: gz.zhiIdx,
      hour: hour,
      minute: now.getMinutes(),
      second: now.getSeconds(),
      sumBase: sumBase,
    }
  };
}

function HexagramDisplay({ lines, changeLine, label }) {
  // lines: array of 6, index 0 = bottom line (line 1)
  // We render top to bottom, so reverse
  const reversed = [...lines].reverse();
  const changeIdx = lines.length - changeLine; // index in reversed array
  return (
    <div className="hex-lines">
      {reversed.map((l, i) => {
        const isChange = i === changeIdx;
        const cls = l === 1
          ? `hex-line hex-line--yang${isChange ? ' hex-line--change' : ''}`
          : `hex-line hex-line--yin${isChange ? ' hex-line--change' : ''}`;
        return <div key={i} className={cls}></div>;
      })}
    </div>
  );
}

function TimeModePanel({ onDivine }) {
  const lang = useLang();
  const T = t(lang);
  const [clock, setClock] = useState(() => new Date());

  useEffect(() => {
    const id = setInterval(() => setClock(new Date()), 1000);
    return () => clearInterval(id);
  }, []);

  const now = clock;
  const sy = now.getFullYear(), sm = now.getMonth() + 1, sd = now.getDate();
  const hour = now.getHours(), minute = now.getMinutes(), second = now.getSeconds();
  const lunar = solarToLunar(sy, sm, sd);
  const gz = getYearGanZhi(lunar.year);
  const shichen = getShichen(hour);

  const ganName = T.tianGan[gz.ganIdx];
  const zhiName = T.diZhi[gz.zhiIdx];
  const zodiac = T.shengXiao[gz.zhiIdx];
  const shichenName = T.shichenNames[shichen - 1];
  const lunarMonthStr = T.lunarMonths[lunar.month - 1];
  const lunarDayStr = T.lunarDays[lunar.day - 1];

  const pad = (n) => String(n).padStart(2, '0');

  return (
    <div>
      <div className="time-info">
        <div className="time-info__ganzhi">{ganName}{zhiName}{lang === 'zh' ? '年' : ' Year'} [{zodiac}]</div>
        <div className="time-info__lunar">{T.lunarLabel}：{lunarMonthStr}{lunarDayStr}</div>
        <div className="time-info__shichen">{T.shichenLabel}：{shichenName}</div>
        <div className="time-info__solar">{sy}-{pad(sm)}-{pad(sd)} {pad(hour)}:{pad(minute)}:{pad(second)}</div>
      </div>
      <button className="altar__btn" onClick={onDivine}>{T.divineBtn}</button>
    </div>
  );
}

/* ========== SOUND PANEL ========== */
function SoundPanel({ onDivine }) {
  const lang = useLang();
  const T = t(lang);
  const [phase, setPhase] = useState(1); // 1 or 2 or 3 (done)
  const [count1, setCount1] = useState(0);
  const [count2, setCount2] = useState(0);
  const [ripples, setRipples] = useState([]);
  const rippleId = useRef(0);

  const handleTap = () => {
    if (phase === 3) return;
    if (phase === 1) setCount1(c => c + 1);
    else setCount2(c => c + 1);
    // Add ripple
    const id = ++rippleId.current;
    setRipples(r => [...r, id]);
    setTimeout(() => setRipples(r => r.filter(x => x !== id)), 600);
  };

  const handleNext = () => {
    if (phase === 1 && count1 > 0) setPhase(2);
  };

  const handleReset = () => {
    setPhase(1);
    setCount1(0);
    setCount2(0);
  };

  const handleDone = () => {
    if (phase === 2 && count2 > 0) setPhase(3);
  };

  const handleDivine = () => {
    if (count1 > 0 && count2 > 0) onDivine(count1, count2);
  };

  const currentCount = phase === 1 ? count1 : count2;
  const phaseLabel = phase <= 1 ? T.soundPhase1 : T.soundPhase2;
  const hintText = phase <= 1 ? T.soundTapHint : T.soundTapHint2;

  return (
    <div className="sound-panel">
      {phase < 3 ? (
        <div>
          <div className="sound-phase">{phaseLabel}</div>
          <div className="sound-hint">{hintText}</div>
          <div className="tap-btn-wrap">
            <button className="tap-btn" onClick={handleTap}>
              {T.soundTapLabel}
              {ripples.map(id => (
                <span key={id} className="tap-ripple" style={{ top: '50%', left: '50%' }}></span>
              ))}
            </button>
          </div>
          <div className="tap-count">{currentCount}</div>
          <div className="tap-count-label">{T.soundTapUnit}</div>
          <div className="sound-btns">
            <button className="sound-btn sound-btn--reset" onClick={handleReset}>{T.soundResetBtn}</button>
            {phase === 1 && (
              <button className="sound-btn" onClick={handleNext} style={{ opacity: count1 > 0 ? 1 : 0.4 }}>{T.soundNextBtn}</button>
            )}
            {phase === 2 && (
              <button className="sound-btn" onClick={handleDone} style={{ opacity: count2 > 0 ? 1 : 0.4 }}>{T.soundNextBtn}</button>
            )}
          </div>
        </div>
      ) : (
        <div>
          <div className="sound-summary">
            <div className="sound-summary__item">
              <div className="sound-summary__label">{T.soundPhase1}</div>
              <div className="sound-summary__val">{count1}</div>
            </div>
            <div className="sound-summary__item">
              <div className="sound-summary__label">{T.soundPhase2}</div>
              <div className="sound-summary__val">{count2}</div>
            </div>
          </div>
          <div className="sound-btns" style={{ marginBottom: '1rem' }}>
            <button className="sound-btn sound-btn--reset" onClick={handleReset}>{T.soundResetBtn}</button>
          </div>
          <button className="altar__btn" onClick={handleDivine}>{T.divineBtn}</button>
        </div>
      )}
    </div>
  );
}

/* ========== CHARACTER PANEL ========== */
function CharacterPanel({ onDivine }) {
  const lang = useLang();
  const T = t(lang);
  const [text, setText] = useState('');
  const [overrides, setOverrides] = useState({});

  const chars = text.split('').filter(c => /[\u4e00-\u9fff]/.test(c)).map(c => ({
    char: c, strokes: getStrokeCount(c)
  }));
  const hasUnknown = chars.some(c => c.strokes === -1);

  const handleOverride = (idx, val) => {
    const v = parseInt(val);
    if (v > 0) setOverrides(o => ({...o, [idx]: v}));
    else setOverrides(o => { const n = {...o}; delete n[idx]; return n; });
  };

  const canDivine = chars.length > 0 && chars.every((c, i) => c.strokes > 0 || overrides[i] > 0);

  const handleDivine = () => {
    if (!canDivine) return;
    onDivine(chars, overrides);
  };

  return (
    <div>
      <div className="altar__label">{T.charInputLabel}</div>
      <div className="altar__hint">{T.charInputHint}</div>
      <div style={{display:'flex',justifyContent:'center',marginBottom:'1rem'}}>
        <input className="altar__input" type="text" placeholder={T.charPlaceholder}
          value={text} onChange={e=>setText(e.target.value)}
          onKeyDown={e=>{ if(e.key==='Enter') handleDivine(); }}
          style={{width:'100%',maxWidth:'280px',fontSize:'1.3rem',textAlign:'center'}}/>
      </div>
      {chars.length > 0 && (
        <div className="stroke-analysis">
          {chars.map((c, i) => (
            <div key={i} className={`stroke-char${c.strokes === -1 ? ' stroke-char--unknown' : ''}`}>
              <span className="stroke-char__char">{c.char}</span>
              <span className="stroke-char__count">
                {c.strokes > 0 ? c.strokes : '?'}{T.charStrokeLabel}
              </span>
              {c.strokes === -1 && (
                <input className="stroke-override__input" type="number" min="1" max="30"
                  placeholder="?"
                  onChange={e => handleOverride(i, e.target.value)} />
              )}
            </div>
          ))}
        </div>
      )}
      {hasUnknown && <div className="stroke-warning">{T.charWarning}</div>}
      <button className="altar__btn" onClick={handleDivine} style={{opacity:canDivine?1:0.5,marginTop:'1rem'}}>{T.divineBtn}</button>
    </div>
  );
}

    catch(e) { return 'zh'; }
  });
  const T = t(lang);

  const subtitleMap = {
    number: T.subtitleNumber,
    time: T.subtitleTime,
    direction: T.subtitleDirection,
    sound: T.subtitleSound,
    character: T.subtitleCharacter || (lang === 'zh' ? '汉 字 起 卦' : 'C H A R A C T E R   D I V I N A T I O N'),
  };

  const handleDivine = () => {
    const nums = [n1, n2, n3].map(Number).filter(v => v > 0 && Number.isInteger(v));
    if (nums.length === 0) return;
    setResult(divine(nums));
    setKey(k => k + 1);
  };

  const handleTimeDivine = () => {
    setResult(divineByTime());
    setKey(k => k + 1);
  };

  const handleDirectionDivine = (dirIndex) => {
    setResult(divineByDirection(dirIndex));
    setKey(k => k + 1);
  };

  const handleSoundDivine = (c1, c2) => {
    setResult(divineBySound(c1, c2));
    setKey(k => k + 1);
  };

  const handleCharDivine = (chars, overrides) => {
    setResult(divineByCharacter(chars, overrides));
    setKey(k => k + 1);
  };

  const onKeyDown = (e) => { if (e.key === 'Enter') handleDivine(); };

  const handleModeChange = (m) => {
    setMode(m);
    setResult(null);
  };

  return (
    <LangContext.Provider value={lang}>
      <LangToggle lang={lang} setLang={setLang} />
      <header className="header">
        <TaijiSVG />
        <h1 className="header__title">{lang === 'zh' ? '梅花易数' : T.title}</h1>
        <p className="header__sub">{subtitleMap[mode]}</p>
      </header>
      <main className="container">
        <section className="altar">
          <ModeTabs mode={mode} setMode={handleModeChange} />
          {mode === 'number' && (
            <div>
              <div className="altar__label">{T.inputLabel}</div>
              <div className="altar__hint">{T.inputHint}</div>
              <div className="altar__inputs">
                <input className="altar__input" type="number" min="1" placeholder={T.placeholder[0]}
                  value={n1} onChange={e=>setN1(e.target.value)} onKeyDown={onKeyDown}/>
                <input className="altar__input" type="number" min="1" placeholder={T.placeholder[1]}
                  value={n2} onChange={e=>setN2(e.target.value)} onKeyDown={onKeyDown}/>
                <input className="altar__input" type="number" min="1" placeholder={T.placeholder[2]}
                  value={n3} onChange={e=>setN3(e.target.value)} onKeyDown={onKeyDown}/>
              </div>
              <button className="altar__btn" onClick={handleDivine}>{T.divineBtn}</button>
            </div>
          )}
          {mode === 'time' && (
            <TimeModePanel onDivine={handleTimeDivine} />
          )}
          {mode === 'direction' && (
            <CompassPanel onDivine={handleDirectionDivine} />
          )}
          {mode === 'sound' && (
            <SoundPanel onDivine={handleSoundDivine} />
          )}
          {mode === 'character' && (
            <CharacterPanel onDivine={handleCharDivine} />
          )}
        </section>
        {result && <ResultSection key={key} result={result} />}
      </main>
      <footer className="footer">
        {T.footer[0]}<br/>{T.footer[1]}
      </footer>
    </LangContext.Provider>
  );
}

/* ========== BG PARTICLES ========== */
(function initCanvas() {
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, particles = [];
  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  for (let i = 0; i < 80; i++) {
    particles.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.5 + 0.3,
      dx: (Math.random() - 0.5) * 0.15,
      dy: -Math.random() * 0.2 - 0.05,
      o: Math.random() * 0.5 + 0.15,
    });
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    for (const p of particles) {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(212,165,116,${p.o})`;
      ctx.fill();
      p.x += p.dx;
      p.y += p.dy;
      if (p.y < -5) { p.y = H + 5; p.x = Math.random() * W; }
      if (p.x < -5) p.x = W + 5;
      if (p.x > W + 5) p.x = -5;
    }
    requestAnimationFrame(draw);
  }
  draw();
})();

/* ========== MOUNT ========== */
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
